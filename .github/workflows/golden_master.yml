name: Golden Master

on:
  push:
    branches: [main, B_06, refactoring]
  pull_request:
    branches: [main, B_06, refactoring]

jobs:
  golden-master:
    name: Golden Master Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Golden Master tests
        run: pytest -m golden_master -v
